<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Senior Architect Agent mode selector</title>
<desc id="desc">Animated diagram showing two operating modes</desc>
<style>
:root {
  --bg:#0B1020; --panel:#111A33; --panel2:#17213F; --ink:#F4F7FF; --muted:#B8C2E0;
  --cyan:#6CE5E8; --blue:#7AA2FF; --violet:#B088FF; --green:#6EE7A8; --amber:#FFD166; --red:#FF6B6B; --line:#5F6C95;
}
.bg { fill: var(--bg); }
.grid { stroke:#101832; stroke-width:1; }
.title { font: 700 42px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: var(--ink); }
.subtitle { font: 400 21px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: var(--muted); }
.nodeText { font: 700 19px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: var(--ink); text-anchor:middle; dominant-baseline:middle; }
.small { font: 400 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: var(--muted); }
.smallBold { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: var(--ink); }
.cardTitle { font: 700 27px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: var(--ink); }
.line { stroke: var(--line); stroke-width:4; fill:none; marker-end:url(#arrow); }
.dashed { stroke-dasharray: 8 8; }
.token { fill: var(--amber); filter:url(#glow); }
.pulse {
  animation: pulse 3.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: .55; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.04); }
}
.dash {
  stroke-dasharray: 12 12;
  animation: dash 1.8s linear infinite;
}
@keyframes dash { to { stroke-dashoffset: -48; } }
.step { animation: stepGlow 9s ease-in-out infinite; }
@keyframes stepGlow {
  0%, 100% { filter:none; }
  8% { filter:url(#glow); }
  16% { filter:none; }
}
.reject { animation: rejectPulse 4s ease-in-out infinite; }
@keyframes rejectPulse {
  0%,100% { opacity:.65; }
  50% { opacity:1; }
}
</style>
<defs>
<marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
  <path d="M 0 0 L 12 6 L 0 12 z" fill="#5F6C95"/>
</marker>
<filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
  <feGaussianBlur stdDeviation="5" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>
<rect class="bg" x="0" y="0" width="1600" height="900"/>
<line class="grid" x1="0" y1="0" x2="0" y2="900"/>
<line class="grid" x1="100" y1="0" x2="100" y2="900"/>
<line class="grid" x1="200" y1="0" x2="200" y2="900"/>
<line class="grid" x1="300" y1="0" x2="300" y2="900"/>
<line class="grid" x1="400" y1="0" x2="400" y2="900"/>
<line class="grid" x1="500" y1="0" x2="500" y2="900"/>
<line class="grid" x1="600" y1="0" x2="600" y2="900"/>
<line class="grid" x1="700" y1="0" x2="700" y2="900"/>
<line class="grid" x1="800" y1="0" x2="800" y2="900"/>
<line class="grid" x1="900" y1="0" x2="900" y2="900"/>
<line class="grid" x1="1000" y1="0" x2="1000" y2="900"/>
<line class="grid" x1="1100" y1="0" x2="1100" y2="900"/>
<line class="grid" x1="1200" y1="0" x2="1200" y2="900"/>
<line class="grid" x1="1300" y1="0" x2="1300" y2="900"/>
<line class="grid" x1="1400" y1="0" x2="1400" y2="900"/>
<line class="grid" x1="1500" y1="0" x2="1500" y2="900"/>
<line class="grid" x1="1600" y1="0" x2="1600" y2="900"/>
<line class="grid" x1="0" y1="0" x2="1600" y2="0"/>
<line class="grid" x1="0" y1="100" x2="1600" y2="100"/>
<line class="grid" x1="0" y1="200" x2="1600" y2="200"/>
<line class="grid" x1="0" y1="300" x2="1600" y2="300"/>
<line class="grid" x1="0" y1="400" x2="1600" y2="400"/>
<line class="grid" x1="0" y1="500" x2="1600" y2="500"/>
<line class="grid" x1="0" y1="600" x2="1600" y2="600"/>
<line class="grid" x1="0" y1="700" x2="1600" y2="700"/>
<line class="grid" x1="0" y1="800" x2="1600" y2="800"/>
<line class="grid" x1="0" y1="900" x2="1600" y2="900"/><text class="title" x="70" y="82">Mode Selector — Existing Evidence vs Raw Idea</text><text class="subtitle" x="72" y="124">The skill chooses the safest path before producing architecture output.</text><rect x="650" y="170" width="300" height="95" rx="24" fill="#17213F" stroke="#6CE5E8" stroke-width="3" class="pulse"/><text class="nodeText" x="800" y="218.0" text-anchor="middle">User request</text><path id="leftPath" class="line dash" d="M720 265 C600 320, 500 340, 395 365"/><path id="rightPath" class="line dash" d="M880 265 C1000 320, 1100 340, 1205 365"/><rect x="120" y="360" width="550" height="295" rx="32" fill="#102A43" stroke="#6EE7A8" stroke-width="4"/><rect x="930" y="360" width="550" height="295" rx="32" fill="#291B44" stroke="#B088FF" stroke-width="4"/><text class="cardTitle" x="160" y="405" fill="#6EE7A8">Existing System Mapping</text><text class="cardTitle" x="970" y="405" fill="#B088FF">Idea-to-Architecture</text><circle cx="165" cy="463" r="5" fill="#6EE7A8"/><text class="smallBold" x="185" y="469">Code / docs / configs exist</text><circle cx="165" cy="501" r="5" fill="#6EE7A8"/><text class="smallBold" x="185" y="507">Inspect first</text><circle cx="165" cy="539" r="5" fill="#6EE7A8"/><text class="smallBold" x="185" y="545">Map real boundaries</text><circle cx="165" cy="577" r="5" fill="#6EE7A8"/><text class="smallBold" x="185" y="583">Do not invent backend, DB, infra</text><circle cx="165" cy="615" r="5" fill="#6EE7A8"/><text class="smallBold" x="185" y="621">Missing areas = Not observed</text><circle cx="975" cy="463" r="5" fill="#B088FF"/><text class="smallBold" x="995" y="469">Only idea / goal exists</text><circle cx="975" cy="501" r="5" fill="#B088FF"/><text class="smallBold" x="995" y="507">Question first</text><circle cx="975" cy="539" r="5" fill="#B088FF"/><text class="smallBold" x="995" y="545">Preserve intent</text><circle cx="975" cy="577" r="5" fill="#B088FF"/><text class="smallBold" x="995" y="583">Everything stays Proposed</text><circle cx="975" cy="615" r="5" fill="#B088FF"/><text class="smallBold" x="995" y="621">Decisions require approval</text><path class="line dash" d="M395 655 C520 710, 590 730, 640 735"/><path class="line dash" d="M1205 655 C1080 710, 1010 730, 960 735"/><rect x="505" y="735" width="590" height="100" rx="28" fill="#111A33" stroke="#7AA2FF" stroke-width="3"/><text class="nodeText" x="800" y="772.0" text-anchor="middle">Lean architecture output</text>
<text class="nodeText" x="800" y="798.0" text-anchor="middle">Markdown + Mermaid first; SVG = review artifact</text><circle class="token" r="9"><animateMotion dur="4.8s" repeatCount="indefinite" path="M800 220 C690 300 525 330 395 430"/></circle>
<circle class="token" r="9"><animateMotion dur="4.8s" repeatCount="indefinite" begin="1.2s" path="M800 220 C910 300 1075 330 1205 430"/></circle>
<circle class="token" r="8"><animateMotion dur="4.8s" repeatCount="indefinite" begin="2.4s" path="M395 650 C520 710 600 735 800 785 C1000 735 1080 710 1205 650"/></circle>
</svg>