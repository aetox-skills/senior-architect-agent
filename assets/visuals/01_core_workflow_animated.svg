<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Senior Architect Agent core workflow</title>
<desc id="desc">Animated workflow for inspect-before-act discipline</desc>
<style>
:root {
  --bg:#0B1020; --panel:#111A33; --panel2:#17213F; --ink:#F4F7FF; --muted:#B8C2E0;
  --cyan:#6CE5E8; --blue:#7AA2FF; --violet:#B088FF; --green:#6EE7A8; --amber:#FFD166; --red:#FF6B6B; --line:#5F6C95;
}
.bg { fill: var(--bg); }
.grid { stroke:#101832; stroke-width:1; }
.title { font: 700 42px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: var(--ink); }
.subtitle { font: 400 21px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: var(--muted); }
.nodeText { font: 700 19px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: var(--ink); text-anchor:middle; dominant-baseline:middle; }
.small { font: 400 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: var(--muted); }
.smallBold { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: var(--ink); }
.cardTitle { font: 700 27px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: var(--ink); }
.line { stroke: var(--line); stroke-width:4; fill:none; marker-end:url(#arrow); }
.dashed { stroke-dasharray: 8 8; }
.token { fill: var(--amber); filter:url(#glow); }
.pulse {
  animation: pulse 3.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: .55; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.04); }
}
.dash {
  stroke-dasharray: 12 12;
  animation: dash 1.8s linear infinite;
}
@keyframes dash { to { stroke-dashoffset: -48; } }
.step { animation: stepGlow 9s ease-in-out infinite; }
@keyframes stepGlow {
  0%, 100% { filter:none; }
  8% { filter:url(#glow); }
  16% { filter:none; }
}
.reject { animation: rejectPulse 4s ease-in-out infinite; }
@keyframes rejectPulse {
  0%,100% { opacity:.65; }
  50% { opacity:1; }
}
</style>
<defs>
<marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
  <path d="M 0 0 L 12 6 L 0 12 z" fill="#5F6C95"/>
</marker>
<filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
  <feGaussianBlur stdDeviation="5" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>
<rect class="bg" x="0" y="0" width="1600" height="900"/>
<line class="grid" x1="0" y1="0" x2="0" y2="900"/>
<line class="grid" x1="80" y1="0" x2="80" y2="900"/>
<line class="grid" x1="160" y1="0" x2="160" y2="900"/>
<line class="grid" x1="240" y1="0" x2="240" y2="900"/>
<line class="grid" x1="320" y1="0" x2="320" y2="900"/>
<line class="grid" x1="400" y1="0" x2="400" y2="900"/>
<line class="grid" x1="480" y1="0" x2="480" y2="900"/>
<line class="grid" x1="560" y1="0" x2="560" y2="900"/>
<line class="grid" x1="640" y1="0" x2="640" y2="900"/>
<line class="grid" x1="720" y1="0" x2="720" y2="900"/>
<line class="grid" x1="800" y1="0" x2="800" y2="900"/>
<line class="grid" x1="880" y1="0" x2="880" y2="900"/>
<line class="grid" x1="960" y1="0" x2="960" y2="900"/>
<line class="grid" x1="1040" y1="0" x2="1040" y2="900"/>
<line class="grid" x1="1120" y1="0" x2="1120" y2="900"/>
<line class="grid" x1="1200" y1="0" x2="1200" y2="900"/>
<line class="grid" x1="1280" y1="0" x2="1280" y2="900"/>
<line class="grid" x1="1360" y1="0" x2="1360" y2="900"/>
<line class="grid" x1="1440" y1="0" x2="1440" y2="900"/>
<line class="grid" x1="1520" y1="0" x2="1520" y2="900"/>
<line class="grid" x1="1600" y1="0" x2="1600" y2="900"/>
<line class="grid" x1="0" y1="0" x2="1600" y2="0"/>
<line class="grid" x1="0" y1="80" x2="1600" y2="80"/>
<line class="grid" x1="0" y1="160" x2="1600" y2="160"/>
<line class="grid" x1="0" y1="240" x2="1600" y2="240"/>
<line class="grid" x1="0" y1="320" x2="1600" y2="320"/>
<line class="grid" x1="0" y1="400" x2="1600" y2="400"/>
<line class="grid" x1="0" y1="480" x2="1600" y2="480"/>
<line class="grid" x1="0" y1="560" x2="1600" y2="560"/>
<line class="grid" x1="0" y1="640" x2="1600" y2="640"/>
<line class="grid" x1="0" y1="720" x2="1600" y2="720"/>
<line class="grid" x1="0" y1="800" x2="1600" y2="800"/>
<line class="grid" x1="0" y1="880" x2="1600" y2="880"/><text class="title" x="70" y="82">Senior Architect Agent — Core Operating Flow</text>
<text class="subtitle" x="72" y="124">Understand before act: inspect, question, map, document, validate, then report.</text>
<line class="line dash" x1="238" y1="260" x2="282" y2="260"/>
<line class="line dash" x1="438" y1="260" x2="512" y2="260"/>
<line class="line dash" x1="668" y1="260" x2="742" y2="260"/>
<line class="line dash" x1="898" y1="260" x2="962" y2="260"/>
<line class="line dash" x1="1118" y1="260" x2="1182" y2="260"/>
<line class="line dash" x1="1260" y1="328" x2="1260" y2="492"/>
<line class="line dash" x1="1182" y1="560" x2="1058" y2="560"/>
<line class="line dash" x1="902" y1="560" x2="778" y2="560"/>
<g class="step" style="animation-delay:0.0s; transform-origin:160px 260px;"><circle cx="160" cy="260" r="84" fill="#253F63" opacity=".18"/><circle cx="160" cy="260" r="74" fill="#17213F" stroke="#7AA2FF" stroke-width="4"/><text class="smallBold" x="160" y="162" text-anchor="middle" fill="#FFD166">1</text><text class="nodeText" x="160" y="260.0" text-anchor="middle">Intake</text></g>
<g class="step" style="animation-delay:1.0s; transform-origin:360px 260px;"><circle cx="360" cy="260" r="84" fill="#253F63" opacity=".18"/><circle cx="360" cy="260" r="74" fill="#17213F" stroke="#7AA2FF" stroke-width="4"/><text class="smallBold" x="360" y="162" text-anchor="middle" fill="#FFD166">2</text><text class="nodeText" x="360" y="260.0" text-anchor="middle">Select Mode</text></g>
<g class="step" style="animation-delay:2.0s; transform-origin:590px 260px;"><circle cx="590" cy="260" r="98" fill="#253F63" opacity=".18"/><circle cx="590" cy="260" r="88" fill="#17213F" stroke="#7AA2FF" stroke-width="4"/><text class="smallBold" x="590" y="148" text-anchor="middle" fill="#FFD166">3</text><text class="nodeText" x="590" y="248.5" text-anchor="middle">Inspect /</text>
<text class="nodeText" x="590" y="271.5" text-anchor="middle">Extract Idea</text></g>
<g class="step" style="animation-delay:3.0s; transform-origin:820px 260px;"><circle cx="820" cy="260" r="84" fill="#253F63" opacity=".18"/><circle cx="820" cy="260" r="74" fill="#17213F" stroke="#7AA2FF" stroke-width="4"/><text class="smallBold" x="820" y="162" text-anchor="middle" fill="#FFD166">4</text><text class="nodeText" x="820" y="260.0" text-anchor="middle">Classify</text></g>
<g class="step" style="animation-delay:4.0s; transform-origin:1040px 260px;"><circle cx="1040" cy="260" r="84" fill="#253F63" opacity=".18"/><circle cx="1040" cy="260" r="74" fill="#17213F" stroke="#7AA2FF" stroke-width="4"/><text class="smallBold" x="1040" y="162" text-anchor="middle" fill="#FFD166">5</text><text class="nodeText" x="1040" y="260.0" text-anchor="middle">Question</text></g>
<g class="step" style="animation-delay:5.0s; transform-origin:1260px 260px;"><circle cx="1260" cy="260" r="84" fill="#253F63" opacity=".18"/><circle cx="1260" cy="260" r="74" fill="#17213F" stroke="#7AA2FF" stroke-width="4"/><text class="smallBold" x="1260" y="162" text-anchor="middle" fill="#FFD166">6</text><text class="nodeText" x="1260" y="260.0" text-anchor="middle">Map</text></g>
<g class="step" style="animation-delay:6.0s; transform-origin:1260px 560px;"><circle cx="1260" cy="560" r="84" fill="#253F63" opacity=".18"/><circle cx="1260" cy="560" r="74" fill="#17213F" stroke="#7AA2FF" stroke-width="4"/><text class="smallBold" x="1260" y="462" text-anchor="middle" fill="#FFD166">7</text><text class="nodeText" x="1260" y="560.0" text-anchor="middle">Document</text></g>
<g class="step" style="animation-delay:7.0s; transform-origin:980px 560px;"><circle cx="980" cy="560" r="84" fill="#253F63" opacity=".18"/><circle cx="980" cy="560" r="74" fill="#17213F" stroke="#7AA2FF" stroke-width="4"/><text class="smallBold" x="980" y="462" text-anchor="middle" fill="#FFD166">8</text><text class="nodeText" x="980" y="560.0" text-anchor="middle">Validate</text></g>
<g class="step" style="animation-delay:8.0s; transform-origin:700px 560px;"><circle cx="700" cy="560" r="84" fill="#253F63" opacity=".18"/><circle cx="700" cy="560" r="74" fill="#17213F" stroke="#7AA2FF" stroke-width="4"/><text class="smallBold" x="700" y="462" text-anchor="middle" fill="#FFD166">9</text><text class="nodeText" x="700" y="560.0" text-anchor="middle">Report</text></g>
<circle class="token" r="10">
  <animateMotion dur="9s" repeatCount="indefinite" path="M 160,260 L 360,260 L 590,260 L 820,260 L 1040,260 L 1260,260 L 1260,560 L 980,560 L 700,560"/>
</circle>
<text class="smallBold" x="120" y="715" fill="#F4F7FF">Checkpoint gates</text><rect x="120" y="740" width="250" height="90" rx="18" fill="#111A33" stroke="#5F6C95" stroke-width="2"/><text class="smallBold" x="138" y="766" fill="#6EE7A8">Intake gate</text><text class="small" x="138" y="796">mode + scope + pass level</text><rect x="405" y="740" width="250" height="90" rx="18" fill="#111A33" stroke="#5F6C95" stroke-width="2"/><text class="smallBold" x="423" y="766" fill="#6EE7A8">Inspection gate</text><text class="small" x="423" y="796">evidence or user intent</text><rect x="690" y="740" width="250" height="90" rx="18" fill="#111A33" stroke="#5F6C95" stroke-width="2"/><text class="smallBold" x="708" y="766" fill="#6EE7A8">Classification gate</text><text class="small" x="708" y="796">areas marked before mapping</text><rect x="975" y="740" width="250" height="90" rx="18" fill="#111A33" stroke="#5F6C95" stroke-width="2"/><text class="smallBold" x="993" y="766" fill="#6EE7A8">Mapping gate</text><text class="small" x="993" y="796">traceable nodes only</text><rect x="1260" y="740" width="250" height="90" rx="18" fill="#111A33" stroke="#5F6C95" stroke-width="2"/><text class="smallBold" x="1278" y="766" fill="#6EE7A8">Validation gate</text><text class="small" x="1278" y="796">source + scope + handoff</text></svg>